<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Иван и Варвара - Приглашение на свадьбу</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flipdown@0.3.2/dist/flipdown.min.css">
</head>
<body>
    <!-- СТРАНИЦА 2 - HERO СЦЕНА И ОСНОВНОЙ КОНТЕНТ -->
    <section id="page2" class="page">
        <!-- Область конверта: фон привязан к высоте блока, заканчивается на 20% ниже -->
        <div class="page2-hero-wrap">
            <div class="page2-bg">
                <img src="assets/2 страница/фон1.png" alt="" class="page2-bg-img">
            </div>
            <div class="hero-envelope" id="heroEnvelope">
            <img src="assets/2 страница/цветы 3.png" alt="Цветы 3" class="hero-flowers-bg">
            <img src="assets/2 страница/конверт2.png" alt="Конверт" class="envelope-open">
            <img src="assets/2 страница/1 фото.png" alt="Фото 1" class="card photo1">
            <img src="assets/2 страница/2 фото.png" alt="Фото 2" class="card photo2">
            <img src="assets/2 страница/билет фон.png" alt="Билет фон" class="card ticket-bg">
            <img src="assets/2 страница/цветы 2.png" alt="Цветы 2" class="hero-flowers-2">
            <img src="assets/2 страница/билет.png" alt="Билет" class="card ticket">
            <img src="assets/2 страница/цветы 1.png" alt="Цветы" class="hero-flowers">
        </div>
        </div>
        <!-- Декоративные фоновые элементы -->
        <div class="decorative-elements">
            <img src="assets/2 страница/фон1.png" alt="Фон 1" class="decor decor-1">
            <img src="assets/2 страница/фон дни.png" alt="Фон дни" class="decor decor-2">
            <img src="assets/2 страница/сердце фон.png" alt="Сердце фон" class="decor decor-3">
            <img src="assets/2 страница/цветы.png" alt="Цветы" class="decor decor-4">
            <img src="assets/2 страница/цветы 2.png" alt="Цветы 2" class="decor decor-5">
            <img src="assets/2 страница/цветы 3.png" alt="Цветы 3" class="decor decor-6">
        </div>

        <!-- Блок приглашения -->
        <div class="invitation-section scroll-fade">
            <div class="invitation-spacer" aria-hidden="true"></div>
            <div class="invitation-content">
                <img src="assets/2 страница/Текст 1.png" alt="Текст 1" class="invitation-text">
                <img src="assets/2 страница/Текст 2.png" alt="Текст 2" class="invitation-text">
            </div>
            <img src="assets/2 страница/цветы 4.png" alt="Цветы" class="invitation-flowers">
        </div>

        <!-- Календарь -->
        <div class="calendar-section scroll-fade">
            <div class="calendar-wrap">
                <img src="assets/2 страница/календарь.png" alt="Календарь" class="calendar-main">
                <div class="calendar-heart-container">
                    <div class="calendar-heart-inner">
                        <img src="assets/2 страница/1 календарь.png" alt="1" class="calendar-number">
                        <img src="assets/2 страница/сердце календарь.png" alt="" class="calendar-heart">
                    </div>
                </div>
            </div>
        </div>

        <!-- Локация -->
        <div class="location-section scroll-fade">
            <img src="assets/2 страница/цветы 5.png" alt="" class="location-flowers-bg" aria-hidden="true">
            <img src="assets/2 страница/текст 3.png" alt="Текст 3" class="location-text location-title">
            <img src="assets/2 страница/Текст 4.png" alt="Текст 4" class="location-text">
            <img src="assets/2 страница/на карте.png" alt="На карте" class="map-image" id="mapButton">
        </div>

        <!-- План дня -->
        <div class="schedule-section scroll-fade">
            <img src="assets/2 страница/план дня.png" alt="План дня" class="schedule-title">
            <div class="schedule-timeline">
                <div class="schedule-stack">
                    <img src="assets/2 страница/сердце фон.png" alt="" class="schedule-heart-bg" aria-hidden="true">
                    <img src="assets/2 страница/расписание 1.png" alt="Расписание 1" class="schedule-layer schedule-layer-1">
                    <img src="assets/2 страница/расписание 2.png" alt="Расписание 2" class="schedule-layer schedule-layer-2">
                    <img src="assets/2 страница/расписание 3.png" alt="Расписание 3" class="schedule-layer schedule-layer-3">
                    <img src="assets/2 страница/расписание линия.png" alt="" class="schedule-layer schedule-layer-line">
                </div>
            </div>
        </div>

        <!-- Дресс-код / Концепция свадьбы -->
        <div class="dresscode-section scroll-fade">
            <img src="assets/2 страница/текст 5.png" alt="Концепция свадьбы" class="dresscode-title">
            <img src="assets/2 страница/текст 6.png" alt="Текст 6" class="dresscode-subtitle">
            <div class="dresscode-palette-row">
                <div class="color-balls">
                    <img src="assets/2 страница/шар 1.png" alt="Шар 1" class="color-ball">
                    <img src="assets/2 страница/шар 2.png" alt="Шар 2" class="color-ball">
                    <img src="assets/2 страница/шар 3.png" alt="Шар 3" class="color-ball">
                    <img src="assets/2 страница/шар 4.png" alt="Шар 4" class="color-ball">
                </div>
                <img src="assets/2 страница/текст 7.png" alt="Цветовая гамма" class="dresscode-palette-label">
            </div>
        </div>

        <!-- Финальный блок -->
        <div class="final-section scroll-fade">
            <img src="assets/2 страница/текст 8.png" alt="Текст 8" class="final-text">
            <img src="assets/2 страница/текст 9.png" alt="Текст 9" class="final-text">
            <!-- Таймер обратного отсчета (FlipDown) -->
            <div class="timer-wrap countdown-section">
                <div class="countdown-wrap">
                    <div id="flipdown" class="flipdown flipdown__theme-light"></div>
                </div>
            </div>
            <img src="assets/2 страница/текст 10.png" alt="Текст 10" class="final-text">
        </div>
    </section>

    <!-- GSAP CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flipdown@0.3.2/dist/flipdown.min.js"></script>
    <script src="config.js"></script>
    <script src="main.js"></script>
</body>
</html>
